<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>дёҠжө·е®¶еәӯжҙ»еҠЁйӣ·иҫҫ</title>
<style>
 *{box-sizing:border-box}
 body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#f0f2f5;margin:0;color:#1a1a1a}
 .wrap{max-width:760px;margin:0 auto;padding:0 16px 48px}
 header{background:linear-gradient(135deg,#1f6feb,#7c3aed);color:#fff;padding:22px 22px;border-radius:0 0 20px 20px;margin:0 -16px 0}
 header h1{margin:0;font-size:21px}
 header .sub{margin-top:7px;font-size:12px;opacity:.92}
 .snap{margin-top:10px;font-size:12px;opacity:.95;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
 .refresh{border:0;background:rgba(255,255,255,.22);color:#fff;padding:6px 16px;border-radius:16px;font-size:12px;cursor:pointer}
 .refresh:active{background:rgba(255,255,255,.42)}
 .controls{position:sticky;top:0;background:#f0f2f5;z-index:5;padding-top:10px;margin:0 -16px;padding-left:16px;padding-right:16px}
 .tabs{display:flex;gap:8px;margin-bottom:8px}
 .tab{flex:1;border:0;background:#e6e9ee;color:#444;padding:10px 6px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
 .tab.on{background:#1f6feb;color:#fff;box-shadow:0 2px 8px rgba(31,111,235,.3)}
 .filters{white-space:nowrap;overflow-x:auto;padding-bottom:10px}
 .filters button{border:0;background:#fff;color:#555;padding:6px 14px;border-radius:20px;margin-right:8px;font-size:13px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
 .filters button.on{background:#111;color:#fff}
 .card{background:#fff;border-radius:14px;padding:16px 18px;margin:12px 0 0;border-left:4px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,.06)}
 .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
 .pill{font-size:12px;padding:2px 10px;border-radius:20px;font-weight:600}
 .cd{background:#fff0e6;color:#e4572e}.cd.soon{background:#e4572e;color:#fff}
 .kid{background:#fff3d6;color:#a86400}.feat{background:#fde8ff;color:#9b1ec0}
 .nw{background:#e6f7ed;color:#1a7f4b}.cat{color:#fff}
 .title{font-weight:600;font-size:16px;line-height:1.4}
 .title a{color:#1a1a1a;text-decoration:none}
 .meta{color:#777;font-size:13px;margin-top:8px}
 .note{color:#b08900;font-size:12px;margin-top:6px}
 .price{color:#e4572e;font-size:13px;margin-top:4px}
 .prog{margin-top:10px;font-size:13px;color:#1a4d2e;background:#f1f8f3;border-radius:8px;padding:8px 10px}
 .prog b{color:#1a7f4b}
 .prog ul{margin:5px 0 0;padding-left:18px}
 .prog li{margin:3px 0}
 .prog li a{color:#1a6fc0;text-decoration:none}
 .empty{padding:60px 0;text-align:center;color:#999}
 .health{margin-top:14px;font-size:12px;color:#b45309;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:8px 12px;line-height:1.5}
</style></head><body><div class="wrap">
<header><h1>рҹ“Ў дёҠжө·е®¶еәӯжҙ»еҠЁйӣ·иҫҫ</h1>
<div class="sub" id="sub">еҠ иҪҪдёӯвҖҰ</div>
<div class="snap"><span id="snap"></span>
<button class="refresh" onclick="load()">рҹ”„ еҲ·ж–°</button></div></header>
<div class="controls">
 <div class="tabs">
  <button class="tab on" data-t="live" onclick="setTab(this,'live')">рҹҺ« иҝ‘жңҹжҙ»еҠЁ</button>
  <button class="tab" data-t="annual" onclick="setTab(this,'annual')">рҹ”Ҙ е№ҙеәҰеӨ§еұ•</button>
  <button class="tab" data-t="venue" onclick="setTab(this,'venue')">рҹҸӣ еёёй©»еңәйҰҶ</button>
  <button class="tab" data-t="b2b" onclick="setTab(this,'b2b')">рҹҸў иЎҢдёҡеұ•</button>
 </div>
 <div class="filters">
  <button class="on" data-k="all" onclick="setF(this,'all')">е…ЁйғЁ</button>
  <button data-k="new" onclick="setF(this,'new')">рҹҶ• жңҖж–°</button>
  <button data-k="kid" onclick="setF(this,'kid')">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§ дәІеӯҗ</button>
  <button data-k="дҪ“иӮІ" onclick="setF(this,'дҪ“иӮІ')">дҪ“иӮІ</button>
  <button data-k="еұ•дјҡ" onclick="setF(this,'еұ•дјҡ')">еұ•дјҡ</button>
  <button data-k="жј”еҮә" onclick="setF(this,'жј”еҮә')">жј”еҮә</button>
 </div>
</div>
<div id="list"><div class="empty">еҠ иҪҪдёӯвҖҰ</div></div>
<div class="health" id="health" style="display:none"></div>
</div>
<script>
const CAT={'дҪ“иӮІ':'#e4572e','еұ•дјҡ':'#1f6feb','жј”еҮә':'#9b51e0'},DEF='#16a34a',NEW_DAYS=7;
const KMAP={'е№ҙеәҰеӣәе®ҡ':'annual','еӣәе®ҡеңәйҰҶ':'venue','дёҙж—¶':'live'};
let curTab='live',curF='all',NEWCUT='';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(s,e){if(!s)return 'жЎЈжңҹеҫ…е®ҡ';const d=s.split('-');if(d.length<3)return s;const m=+d[1],day=+d[2];
 if(e&&e!==s){const x=e.split('-');if(x.length===3){const em=+x[1],ed=+x[2];return em===m?`${m}жңҲ${day}вҖ“${ed}ж—Ҙ`:`${m}жңҲ${day}ж—ҘвҖ“${em}жңҲ${ed}ж—Ҙ`;}}
 return `${m}жңҲ${day}ж—Ҙ`;}
function cd(s,e,t){if(!s)return null;const sd=new Date(s+'T00:00:00');if(isNaN(sd))return null;
 const diff=Math.round((sd-t)/864e5);
 if(diff<0){if(e){const ed=new Date(e+'T00:00:00');if(!isNaN(ed)&&ed>=t)return['иҝӣиЎҢдёӯ',true];}return null;}
 if(diff===0)return['д»ҠеӨ©',true];if(diff===1)return['жҳҺеӨ©',true];return[diff+'еӨ©еҗҺ',diff<=14];}
function card(ev,t){const color=CAT[ev.type]||DEF,kind=(ev.audience==='B2B')?'b2b':(KMAP[ev.kind]||'live');
 let title=esc(ev.title);if(ev.official_url)title=`<a href="${esc(ev.official_url)}" target="_blank" rel="noopener">${title}</a>`;
 const isNew=!!(ev.first_seen&&ev.first_seen>=NEWCUT);
 let p=`<span class="pill cat" style="background:${color}">${esc(ev.type)}</span>`;
 if(isNew)p+='<span class="pill nw">рҹҶ• жңҖж–°</span>';
 if(ev.featured)p+='<span class="pill feat">рҹ”Ҙ йҮҚзЈ…</span>';
 const c=cd(ev.start_date,ev.end_date,t);if(c)p+=`<span class="pill cd ${c[1]?'soon':''}">${c[0]}</span>`;
 if(ev.kid_friendly){const lab='рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§ дәІеӯҗ'+(ev.age_range?(' '+ev.age_range):'');p+=`<span class="pill kid">${esc(lab)}</span>`;}
 let meta=`рҹ“… ${fmtDate(ev.start_date,ev.end_date)}`;if(ev.venue)meta+=`&nbsp;&nbsp;рҹ“Қ ${esc(ev.venue)}`;
 if(ev.sessions&&ev.sessions.length>1)meta+=`<br>рҹҺ¬ еӨҡеңәж¬Ў ${ev.sessions.map(d=>esc(d.slice(5))).join('гҖҒ')}`;
 const note=ev.note?`<div class="note">вҡ  ${esc(ev.note)}</div>`:'';
 const price=ev.price_range?`<div class="price">${esc(ev.price_range)}</div>`:'';
 let prog='';
 if(ev.programs&&ev.programs.length){prog='<div class="prog"><b>рҹҺӯ иҝ‘жңҹеңЁжј”</b><ul>'+ev.programs.map(p=>`<li><a href="${esc(p.u||'#')}" target="_blank" rel="noopener">${esc(p.t)}${p.d?(' В· '+p.d.slice(5)):''}</a></li>`).join('')+'</ul></div>';}
 return `<div class="card" style="border-left-color:${color}" data-kind="${kind}" data-type="${esc(ev.type)}" data-kid="${ev.kid_friendly?1:0}" data-new="${isNew?1:0}" data-unfit="${ev.kid_unfit?1:0}"><div class="top">${p}</div><div class="title">${title}</div><div class="meta">${meta}</div>${note}${price}${prog}</div>`;}
function mark(sel,btn){document.querySelectorAll(sel+' button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function setTab(b,t){curTab=t;mark('.tabs',b);apply();}
function setF(b,f){curF=f;mark('.filters',b);apply();}
function apply(){let n=0;
 document.querySelectorAll('.card').forEach(c=>{
   const tabOk=c.dataset.kind===curTab;
   const fOk=curF==='all'||(curF==='new'?c.dataset.new==='1':curF==='kid'?(c.dataset.kid==='1'&&c.dataset.unfit!=='1'):c.dataset.type===curF);
   const ok=tabOk&&fOk;c.style.display=ok?'block':'none';if(ok)n++;});
 document.getElementById('emptyTip').style.display=n?'none':'block';}
function render(data){const evts=(data.events||[]).slice();
 const t=new Date();t.setHours(0,0,0,0);
 const cc=new Date(t);cc.setDate(cc.getDate()-(NEW_DAYS-1));NEWCUT=cc.toISOString().slice(0,10);
 const nNew=evts.filter(e=>e.first_seen&&e.first_seen>=NEWCUT).length;
 const h=data.health||{},hn=Object.keys(h),hbad=hn.filter(n=>h[n].status!=='ok');
 document.getElementById('snap').textContent='рҹ“… ж•°жҚ®жӣҙж–°дәҺ '+(data.generatedAt||'')+' В· жәҗ вң…'+(hn.length-hbad.length)+(hbad.length?' вҡ пёҸ'+hbad.length:'');
 const hd=document.getElementById('health');
 if(hbad.length){hd.style.display='block';hd.innerHTML='вҡ пёҸ ж•°жҚ®жәҗејӮеёё(е·Із”ЁдёҠж¬Ўж•°жҚ®йЎ¶жӣҝ,дёҚеҪұе“Қеұ•зӨә): '+hbad.map(n=>esc(n)+'В·'+esc(h[n].status)).join('гҖҒ');}
 else{hd.style.display='none';}
 const liveN=evts.filter(e=>e.kind==='дёҙж—¶'&&e.audience!=='B2B').length;
 const b2bN=evts.filter(e=>e.audience==='B2B').length;
 document.getElementById('sub').textContent='иҝ‘жңҹ'+liveN+' В· е№ҙеәҰ'+evts.filter(e=>e.kind==='е№ҙеәҰеӣәе®ҡ').length+' В· еңәйҰҶ'+evts.filter(e=>e.kind==='еӣәе®ҡеңәйҰҶ').length+' В· иЎҢдёҡ'+b2bN+' В· рҹҶ•'+nNew;
 const ord={'дёҙж—¶':0,'е№ҙеәҰеӣәе®ҡ':1,'еӣәе®ҡеңәйҰҶ':2};
 evts.sort((a,b)=>{const o=(ord[a.kind]||0)-(ord[b.kind]||0);return o||((a.start_date||'9999')<(b.start_date||'9999')?-1:1);});
 document.getElementById('list').innerHTML=evts.map(e=>card(e,t)).join('')+'<div class="empty" id="emptyTip" style="display:none">иҜҘеҲҶзұ»дёӢжҡӮж— жҙ»еҠЁ</div>';
 apply();}
async function load(){document.getElementById('list').innerHTML='<div class="empty">еҠ иҪҪдёӯвҖҰ</div>';
 try{const r=await fetch('events.json?t='+Date.now(),{cache:'no-store'});render(await r.json());}
 catch(e){document.getElementById('list').innerHTML='<div class="empty">еҠ иҪҪеӨұиҙҘ,иҜ·жЈҖжҹҘзҪ‘з»ңеҗҺзӮ№еҲ·ж–°</div>';}}
load();
</script></body></html>
