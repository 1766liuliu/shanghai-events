name: refresh

# 云端定时刷新:每天北京时间 08:00 / 20:00(UTC 0:00 / 12:00)
# 也可在 Actions 页手动「Run workflow」。
on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}
  # 境内中继(腾讯云SCF)提交 cn_events.json 后,立即刷新站点(近实时上线)
  push:
    branches: [main]
    paths:
      - 'data/cn_events.json'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write   # 允许把更新后的数据提交回仓库

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行采集层(抓取→过滤→生成 index.html/events.json)
        run: python collector/main.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "本次无变化,跳过提交"
          else
            git commit -m "auto refresh $(date -u '+%Y-%m-%dT%H:%MZ')"
            git push
          fi
