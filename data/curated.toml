# ───────────────────────────────────────────────────────────
# 上海家庭活动雷达 · 策展活动清单(可直接在 GitHub 网页里编辑)
#
# 【怎么加一条活动】复制任意一段(从 [[event]] 到它下面的空行),粘到文件末尾,改成你的内容。
# 【规则】
#   · 所有文字都写在英文双引号 "..." 里,别删引号(标题里有冒号也没关系)。
#   · start / end 用 "2026-07-17" 这种格式;不确定就留空 ""(会归到"年度大展")。
#   · kid = true 适合亲子 / false 不特别适合;featured = true 是重磅活动。
#   · tags 是标签数组,如 ["科技/AI"];没有就写 []
#   · 场馆类(博物馆/剧场/动物园等)会自动归到"常驻场馆";有具体日期的归"近期/年度"。
#   · 改完点 GitHub 的 "Commit changes",几分钟后自动上线。
#   · 万一格式写错,系统会自动沿用上一次的好数据并在页面提示,不会崩。
# ───────────────────────────────────────────────────────────


